<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing TV</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: #0f1b2d;
        --text: #f5f7fb;
        --muted: #9db0ca;
        --accent: #4f8cff;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #15263f);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(92vw, 760px);
        background: rgba(15, 27, 45, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      }

      .eyebrow {
        display: inline-block;
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.8rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 1.8rem;
      }

      a {
        text-decoration: none;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        font-weight: 700;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">Welcome</span>
      <h1>Build your next idea with a polished landing page.</h1>
      <p>This starter page is ready to customize for your product, event, or showcase. Replace the text and branding to make it your own.</p>
      <div class="actions">
        <a class="primary" href="#">Get Started</a>
        <a class="secondary" href="#">Learn More</a>
      </div>
    </main>
  </body>
</html>
